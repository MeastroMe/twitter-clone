{% extends "base.html" %}

{% block content %}
    <h2>Post a tweet</h2>
    <form method="post">
        {% csrf_token %}
        <textarea name="content" rows="3" class="form-control" placeholder="What's happening?"></textarea>
        <button type="submit" class="btn btn-primary mt-2">Tweet</button>
    </form>
{% endblock %}
